@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;width:100%;overflow:hidden;}
body{background:#080604;color:#d0b880;font-family:'Cinzel',serif;}
input,select,textarea,button{font-family:inherit;outline:none;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:rgba(0,0,0,0.3);}
::-webkit-scrollbar-thumb{background:#4a3820;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#6a5030;}
.gi{background:rgba(255,255,255,0.04)!important;border:1px solid rgba(200,153,30,0.25)!important;color:#d0b880!important;border-radius:2px!important;transition:border-color .2s;}
.gi:focus{border-color:rgba(200,153,30,0.6)!important;}
@keyframes shimmer{0%{opacity:.4}50%{opacity:.95}100%{opacity:.4}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes foil1{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes foil2{0%{background-position:100% 50%}50%{background-position:0% 50%}100%{background-position:100% 50%}}
@keyframes foilNaruto{0%{background-position:0% 0%}33%{background-position:100% 100%}66%{background-position:50% 0%}100%{background-position:0% 0%}}
@keyframes sway{0%,100%{transform:rotate(-1deg)}50%{transform:rotate(1deg)}}
@keyframes foilGold{0%,100%{opacity:0.55;filter:brightness(1)}50%{opacity:1;filter:brightness(1.35)}}
@keyframes foilSilver{0%,100%{filter:brightness(1) saturate(0.9)}50%{filter:brightness(1.4) saturate(1.3) hue-rotate(5deg)}}
@keyframes foilHue{from{filter:hue-rotate(0deg)}to{filter:hue-rotate(360deg)}}
@keyframes foilGlare{0%,100%{opacity:0.2}50%{opacity:0.7}}
@keyframes foilScan{from{background-position:0% 0%}to{background-position:0% 100%}}
@keyframes foilSparkleA{0%,100%{opacity:0.05}30%,70%{opacity:0.2}50%{opacity:1}}
@keyframes foilSparkleB{0%,30%,70%,100%{opacity:0.05}50%{opacity:0.95}}
@keyframes foilChrome{0%,100%{filter:brightness(0.95) saturate(0.9)}50%{filter:brightness(1.3) saturate(1.5)}}
@keyframes foilGhost{0%,100%{opacity:0.03}50%{opacity:0.12}}
@keyframes foilShine{from{transform:translateX(-100%)}to{transform:translateX(600%)}}
@keyframes foilBadge25{0%,100%{opacity:0.6;filter:brightness(1)}50%{opacity:1;filter:brightness(1.4)}}
@keyframes foilBadgePulse{0%,100%{opacity:0.1}50%{opacity:0.28}}
@keyframes foilPetrol{0%,100%{filter:hue-rotate(0deg) brightness(1)}50%{filter:hue-rotate(35deg) brightness(1.2)}}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes headerShimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes prismatic{0%{filter:hue-rotate(0deg) brightness(1.2)}25%{filter:hue-rotate(90deg) brightness(1.4)}50%{filter:hue-rotate(180deg) brightness(1.2)}75%{filter:hue-rotate(270deg) brightness(1.4)}100%{filter:hue-rotate(360deg) brightness(1.2)}}
@keyframes hieroglyphFloat{0%{background-position:0% 0%}100%{background-position:100% 100%}}
@media print{.no-print{display:none!important;}}
@media print{header,.no-print,button,select,input{display:none!important;}body{background:#fff!important;color:#111!important;font-size:10px;}main{overflow:visible!important;height:auto!important;}}
@media (max-width:640px){.m-hide{display:none!important;}.m-fullscreen{position:fixed!important;inset:0!important;width:100vw!important;max-width:100vw!important;min-height:100vh!important;height:100vh!important;border-radius:0!important;}.m-pad-bottom{padding-bottom:68px!important;}.m-sidebar-overlay{position:fixed!important;top:0!important;left:0!important;height:100vh!important;width:82vw!important;max-width:320px!important;z-index:300!important;overflow-y:auto!important;}button,select,input{min-height:36px;}.gi{font-size:16px!important;padding:10px 12px!important;}}

/* texte net : backfaceVisibility+isolation sur wrapper carte */

@keyframes mandalaRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes mandalaGlow { 0%,100% { filter: drop-shadow(0 0 6px rgba(200,153,30,0.6)); } 50% { filter: drop-shadow(0 0 14px rgba(200,153,30,0.9)); } }
@keyframes idleFadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes idlePulse { 0%,100% { filter: drop-shadow(0 0 20px rgba(200,153,30,0.4)) drop-shadow(0 0 50px rgba(200,153,30,0.25)); } 50% { filter: drop-shadow(0 0 40px rgba(200,153,30,0.9)) drop-shadow(0 0 90px rgba(200,153,30,0.5)) drop-shadow(0 0 120px rgba(255,215,0,0.2)); } }
.idle-overlay { position:fixed; inset:0; background:#000; z-index:99999; display:flex; align-items:center; justify-content:center; cursor:pointer; animation:idleFadeIn 1.2s ease; }
.idle-overlay img { width:min(88vh,88vw); height:min(88vh,88vw); object-fit:contain; animation:idlePulse 4s ease-in-out infinite; }
.idle-overlay .idle-hint { position:absolute; bottom:32px; left:50%; transform:translateX(-50%); color:rgba(200,153,30,0.5); font-family:"Cinzel",serif; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; }
</style>
