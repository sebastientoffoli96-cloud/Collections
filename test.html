<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Test</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body style="background:#0C0805;color:#C8991E;font-family:serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0">
<div id="root"></div>
<script>
window.onerror = function(msg, src, line, col, err) {
  document.body.innerHTML = '<div style="color:red;padding:20px;font-size:14px">ERREUR: ' + msg + '<br>Ligne: ' + line + '</div>';
};
try {
  const { createElement: h, useState } = React;
  function App() {
    const [count, setCount] = useState(0);
    return h('div', { style: { textAlign: 'center' } },
      h('div', { style: { fontSize: 24, marginBottom: 16 } }, '✅ React fonctionne !'),
      h('div', { style: { fontSize: 14, marginBottom: 16, color: '#888' } }, 'Cabinet Égyptien — Test GitHub Pages'),
      h('button', {
        onClick: function() { setCount(function(c) { return c + 1; }); },
        style: { padding: '8px 16px', background: '#C8991E', border: 'none', borderRadius: 4, cursor: 'pointer', color: '#000' }
      }, 'Clics : ' + count)
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(h(App, null));
} catch(e) {
  document.body.innerHTML = '<div style="color:red;padding:20px">ERREUR: ' + e.message + '</div>';
}
</script>
</body>
</html>
